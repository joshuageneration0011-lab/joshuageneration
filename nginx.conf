# Rate limiting zones for API and Login (defined in http context)
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=login_limit:10m rate=2r/s;

server {
    listen 80;
    listen [::]:80;
    server_name joshuasgeneration.com www.joshuasgeneration.com;
    return 301 https://joshuasgeneration.com$request_uri;
}

server {
    listen 80;
    listen [::]:80;
    server_name 84.46.243.59;
    client_max_body_size 500M;

    # Enable Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_proxied any;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/x-javascript application/xml application/json image/svg+xml;
    gzip_disable "MSIE [1-6]\.";

    # Frontend Static Files
    root /var/www/joshuageneration/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
        # Do not cache HTML to ensure instant updates on redeploys
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
    }

    # Cache hashed static assets (Vite assets have dynamic hashes in their filenames)
    location /assets/ {
        expires 1y;
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Cache non-hashed static assets (favicon, logo, etc.) with revalidation
    location ~* \.(?:ico|png|jpg|jpeg|gif|svg|woff|woff2|ttf|eot)$ {
        expires 14d;
        access_log off;
        add_header Cache-Control "public, max-age=1209600, must-revalidate";
    }

    # SEO Routes: Proxy to backend for dynamic OpenGraph tags
    location ~ ^/(sermons|sermon|blog|books)/ {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Backend API Reverse Proxy
    location ^~ /api {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Upload Speed & Size Optimizations
        proxy_request_buffering off;
        client_max_body_size 500M;
        client_body_buffer_size 10M;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name joshuasgeneration.com www.joshuasgeneration.com;
    client_max_body_size 500M;

    ssl_certificate /etc/letsencrypt/live/joshuasgeneration.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/joshuasgeneration.com/privkey.pem;
    
    # Secure SSL parameters
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;

    # HSTS & HTTP Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    
    # Hide Nginx version
    server_tokens off;

    # Block access to hidden files (.git, .env, etc.)
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Block common SQL injections and scanners
    if ($query_string ~* "union.*select.*\(") {
        return 403;
    }
    if ($query_string ~* "concat.*\(") {
        return 403;
    }

    # Enable Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_proxied any;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/x-javascript application/xml application/json image/svg+xml;
    gzip_disable "MSIE [1-6]\.";

    # Frontend Static Files
    root /var/www/joshuageneration/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
        # Do not cache HTML to ensure instant updates on redeploys
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    }

    # Cache hashed static assets (Vite assets have dynamic hashes in their filenames)
    location /assets/ {
        expires 1y;
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Cache non-hashed static assets (favicon, logo, etc.) with revalidation
    location ~* \.(?:ico|png|jpg|jpeg|gif|svg|woff|woff2|ttf|eot)$ {
        expires 14d;
        access_log off;
        add_header Cache-Control "public, max-age=1209600, must-revalidate";
    }

    # Dynamic Media Uploads (Sermons & Thumbnails)
    location ^~ /sermons/ {
        alias /var/www/joshuageneration/public/sermons/;
        access_log off;
        expires max;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location ^~ /thumbnails/ {
        alias /var/www/joshuageneration/public/thumbnails/;
        access_log off;
        expires max;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }



    # Rate-limited Login Route
    location = /api/auth/login {
        limit_req zone=login_limit burst=5 nodelay;
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SEO Routes: Proxy to backend for dynamic OpenGraph tags
    location ~ ^/(sermons|sermon|blog|books)/ {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Backend API Reverse Proxy
    location ^~ /api {
        # Apply General API Rate Limit
        limit_req zone=api_limit burst=20 nodelay;
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Upload Speed & Size Optimizations
        proxy_request_buffering off;
        client_max_body_size 500M;
        client_body_buffer_size 10M;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }
}
