server {
    listen 80;
    listen [::]:80;
    server_name joshuasgeneration.com www.joshuasgeneration.com;
    return 301 https://joshuasgeneration.com$request_uri;
}

server {
    listen 80;
    listen [::]:80;
    server_name 84.46.243.59;
    client_max_body_size 150M;

    # Enable Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_proxied any;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/x-javascript application/xml application/json image/svg+xml;
    gzip_disable "MSIE [1-6]\.";

    # Frontend Static Files
    root /var/www/joshuageneration/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
        # Do not cache HTML to ensure instant updates on redeploys
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
    }

    # Cache hashed static assets (Vite assets have dynamic hashes in their filenames)
    location /assets/ {
        expires 1y;
        access_log off;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Cache non-hashed static assets (favicon, logo, etc.) with revalidation
    location ~* \.(?:ico|png|jpg|jpeg|gif|svg|woff|woff2|ttf|eot)$ {
        expires 14d;
        access_log off;
        add_header Cache-Control "public, max-age=1209600, must-revalidate";
    }

    # Backend API Reverse Proxy
    location /api {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name joshuasgeneration.com www.joshuasgeneration.com;
    client_max_body_size 150M;

    ssl_certificate /etc/letsencrypt/live/joshuasgeneration.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/joshuasgeneration.com/privkey.pem;
    
    # Secure SSL parameters
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;

